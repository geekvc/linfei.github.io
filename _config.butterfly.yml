# --------------------------------------
# Butterfly 主题个性化配置（分离配置文件）
# 说明：主题目录 themes/butterfly/_config.yml 保持官方默认值不变，
#      所有个性化定制都写在这里，字段名与主题默认配置一一对应，
#      Hexo 会自动将本文件与主题默认配置合并（本文件优先级更高）。
# 官方文档：https://butterfly.js.org/
# --------------------------------------

# --------------------------------------
# Navigation Settings
# --------------------------------------

nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: true

menu:
  首页: / || fas fa-home
  文章: /archives/ || fas fa-archive
  个人简历: /resume/ || fas fa-id-card
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tags
  关于我: /about/ || fas fa-user

# --------------------------------------
# Social media links
# --------------------------------------
social:
  fas fa-mobile-screen: tel:15628457313 || 手机 · 微信 || '#4a7dbe'
  fas fa-envelope: mailto:1771641605@qq.com || Email || '#4a7dbe'

# --------------------------------------
# Image Settings
# --------------------------------------

avatar:
  img: /img/avatar.jpg
  effect: false

default_top_img: /img/top-cover.jpg
index_img: /img/top-cover.jpg
archive_img: /img/top-cover.jpg

# --------------------------------------
# Index page settings
# --------------------------------------

subtitle:
  enable: true
  effect: true
  source: false
  sub:
    - 石河子大学英语专业硕士研究生
    - 求职 · 教学 · 分享干货
    - 大家好，我是琳霏 ✨

index_layout: 3

# --------------------------------------
# Aside Settings
# --------------------------------------

aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 石河子大学英语专业硕士研究生 · 求职与教学经验分享中，欢迎交流 👋
    button:
      enable: true
      icon: fas fa-id-card
      text: 我的简历
      link: /resume/
  card_announcement:
    enable: true
    content: 欢迎来到琳霏的博客！这里记录英语专业求职与教学干货，右下角可以和我的 AI 分身聊天，了解更多关于我～
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_categories:
    enable: true
    limit: 8
    expand: none
  card_tags:
    enable: true
    limit: 40
    color: false
    orderby: random
    order: 1
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true

# --------------------------------------
# Post Settings
# --------------------------------------

post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# --------------------------------------
# Footer Settings
# --------------------------------------
footer:
  owner:
    enable: true
    since: 2026
  copyright:
    enable: true
    version: false
  custom_text: '本站为个人博客，内容仅代表个人观点'

# --------------------------------------
# Dark Mode
# --------------------------------------
darkmode:
  enable: true
  button: true
  autoChangeMode: false

# --------------------------------------
# Search（本地搜索，无需服务器）
# --------------------------------------
search:
  use: local_search
  placeholder:
  local_search:
    preload: false
    top_n_per_article: 1
    unescape: false

# --------------------------------------
# Chat Services - AI 分身聊天入口在主题外部通过 inject 注入
# --------------------------------------
chat:
  use:
  rightside_button: false

# --------------------------------------
# Series（系列文章）
# --------------------------------------
series:
  enable: true
  orderBy: 'date'
  order: 1
  number: true

# --------------------------------------
# Beautify / Effect
# --------------------------------------

# 主题色（青色/靛蓝系，更显质感）
theme_color:
  enable: true
  main: "#4a63b9"
  paginator: "#4a63b9"
  button_hover: "#3f51a3"
  text_selection: "#4a63b9"
  link_color: "#4a63b9"
  meta_color: "#858585"
  hr_color: "#e0e4f5"
  code_foreground: "#F47466"
  code_background: "rgba(27, 31, 35, .05)"
  toc_color: "#4a63b9"
  blockquote_padding_color: "#4a63b9"
  blockquote_background_color: "#4a63b9"
  scrollbar_color: "#4a63b9"
  meta_theme_color_light: "ffffff"
  meta_theme_color_dark: "#0d0d0d"

rounded_corners_ui: true

mask:
  header: true
  footer: true

enter_transitions: true

display_mode: light

# --------------------------------------
# Inject: 注入 AI 分身聊天悬浮框脚本
# --------------------------------------
inject:
  head:
    - <link rel="stylesheet" href="/css/ai-chat-widget.css">
  bottom:
    - <script src="/js/ai-chat-widget.js"></script>
